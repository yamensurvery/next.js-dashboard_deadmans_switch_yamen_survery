name: Evaluate Switches

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Call evaluate-switches endpoint
        run: |
          curl -f -L -X POST "${{ secrets.APP_URL }}/api/cron/evaluate-switches" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"